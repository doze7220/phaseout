<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Puzzle Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-wrapper">
        <div id="score-board"><span id="score">0</span></div>
        <div id="chain-popup"></div>
    </div>

    <!-- Matter.jsをCDNから読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // ==========================================
        // 【パラメータ設定エリア】
        // ==========================================

        // 宝石の種類（形状）のリストと、それぞれの登場ON/OFFフラグ
        const SHAPE_CONFIG = [
            { type: 'circle', enabled: true },  // 円
            { type: 'triangle', enabled: true },  // 正三角形
            { type: 'square', enabled: true },  // 正方形
            { type: 'rectangle', enabled: true }   // 長方形（1:2）
        ];

        // 宝石の色（7色）と、それぞれの登場ON/OFFフラグ
        const COLOR_CONFIG = [
            { color: '#FF3B30', name: 'Red', enabled: true },
            { color: '#007AFF', name: 'Blue', enabled: true },
            { color: '#34C759', name: 'Green', enabled: true },
            { color: '#FFCC00', name: 'Yellow', enabled: true },
            { color: '#AF52DE', name: 'Purple', enabled: false },
            { color: '#FF9500', name: 'Orange', enabled: false },
            { color: '#5AC8FA', name: 'Cyan', enabled: false }
        ];

        // 宝石のサイズ設定（正規分布パラメータ）
        const SIZE_MIN = 10;        // 最小サイズ
        const SIZE_MAX = 60;        // 最大サイズ
        const SIZE_STEP = 5;        // 刻み幅
        const SIZE_MEAN = 25;       // 正規分布の中央値/平均値
        const SIZE_STD_DEV = 5;    // サイズのばらつき具合/標準偏差

        // 連鎖とみなす接触判定の許容距離 (px)
        const CONNECTION_THRESHOLD = 20;

        // レーザーアニメーションの伝播速度（1階層あたりのアニメーション時間 ms）
        const LASER_ANIMATION_MS = 100;

        // ==========================================

        // 登場ONになっている形状と色のみを抽出
        const activeShapes = SHAPE_CONFIG.filter(s => s.enabled).map(s => s.type);
        const activeColors = COLOR_CONFIG.filter(c => c.enabled).map(c => c.color);

        // エンジン、レンダラー、ワールドのセットアップ
        const Engine = Matter.Engine,
            Render = Matter.Render,
            Runner = Matter.Runner,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Events = Matter.Events,
            Query = Matter.Query;

        const engine = Engine.create();

        // 重力の設定（標準的な下向き）
        engine.gravity.y = 1;

        const gameWrapper = document.getElementById('game-wrapper');
        const scoreElement = document.getElementById('score');
        const chainPopup = document.getElementById('chain-popup');

        const render = Render.create({
            element: gameWrapper,
            engine: engine,
            options: {
                width: 400,
                height: 600,
                wireframes: false,
                background: 'transparent',
                pixelRatio: window.devicePixelRatio || 1
            }
        });

        // 壁と床の作成
        const wallOptions = {
            isStatic: true,
            render: { fillStyle: '#444' }
        };
        const ground = Bodies.rectangle(200, 610, 400, 20, wallOptions);
        const leftWall = Bodies.rectangle(-10, 300, 20, 600, wallOptions);
        const rightWall = Bodies.rectangle(410, 300, 20, 600, wallOptions);
        Composite.add(engine.world, [ground, leftWall, rightWall]);

        // グローバル状態管理
        let score = 0;
        const GEMS = []; // ワールド上の宝石を管理する配列
        let lightLines = []; // レーザー描画用のデータ配列
        let particles = []; // 破壊パーティクル用のデータ配列
        let isAnimating = false; // 排他制御（タップ無効化）用のフラグ

        // 独自のスコアフォーマット用定義と関数
        const SCORE_UNITS = ['万', '億', '兆', '京', '垓', '𥝱', '穣', '溝', '澗', '正', '載', '極'];

        function formatScore(value) {
            if (value < 10000) {
                return Math.floor(value).toString();
            }
            
            let exp = Math.floor(Math.log10(value));
            let unitPower = Math.floor(exp / 4); 
            
            let index = unitPower - 1; 
            let loopCount = Math.floor(index / 12);
            let unitIndex = index % 12;

            let unitString = SCORE_UNITS[unitIndex];
            for (let i = 0; i < loopCount; i++) {
                unitString += '極';
            }
            
            let divisor = Math.pow(10, unitPower * 4);
            let num = value / divisor;
            
            // 小数点以下は4桁目以降を切り捨て（足切り）、常に第3位までゼロ埋め
            let numFloorStr = (Math.floor(num * 1000 + 1e-9) / 1000).toFixed(3);
            
            return numFloorStr + unitString;
        }

        // 正規分布（Box-Muller変換）に基づく乱数生成
        function generateNormalRandom(mean, stdDev) {
            let u = 0, v = 0;
            while (u === 0) u = Math.random(); // 0を回避
            while (v === 0) v = Math.random();
            let num = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            return num * stdDev + mean;
        }

        // 宝石を生成する関数
        function createGem(x, y) {
            // 正規分布によるサイズ生成と丸め・クリップ処理
            let rawSize = generateNormalRandom(SIZE_MEAN, SIZE_STD_DEV);
            let steppedSize = Math.round(rawSize / SIZE_STEP) * SIZE_STEP;
            const radius = Math.max(SIZE_MIN, Math.min(SIZE_MAX, steppedSize));

            // 有効な形状・色からランダムに選択
            const shape = activeShapes[Math.floor(Math.random() * activeShapes.length)];
            const colorIndex = Math.floor(Math.random() * activeColors.length);
            const colorStr = activeColors[colorIndex];

            const bodyOptions = {
                restitution: 0.3, // 反発係数
                friction: 0.05,   // 摩擦
                density: 0.001,   // 密度
                render: {
                    fillStyle: colorStr,
                    strokeStyle: 'rgba(255,255,255,0.5)',
                    lineWidth: 2
                }
            };

            let gem;
            switch (shape) {
                case 'circle':
                    gem = Bodies.circle(x, y, radius, bodyOptions);
                    break;
                case 'triangle':
                    // radius+2 は円の見た目の大きさに概ね合わせるための補正
                    gem = Bodies.polygon(x, y, 3, radius + 2, bodyOptions);
                    break;
                case 'square':
                    const sqSize = radius * 2 * 0.8;
                    gem = Bodies.rectangle(x, y, sqSize, sqSize, bodyOptions);
                    break;
                case 'rectangle':
                    const w = radius * 1.5;
                    const h = w * 2; // 1:2比率
                    gem = Bodies.rectangle(x, y, w, h, bodyOptions);
                    break;
                default:
                    gem = Bodies.circle(x, y, radius, bodyOptions);
            }

            // カスタムプロパティを付与
            gem.colorId = colorIndex; // ID管理
            gem.colorStr = colorStr;  // 描画・エフェクト用
            gem.isGem = true;
            gem.isMarkedForDeletion = false;
            gem.customRadius = radius; // 距離判定用

            return gem;
        }

        // 初期配置
        function spawnInitialGems() {
            const count = 150;
            for (let i = 0; i < count; i++) {
                const row = Math.floor(i / 10);
                const col = i % 10;
                const x = 30 + col * 37 + (row % 2 === 0 ? 0 : 18);
                const y = -50 - row * 35;
                const gem = createGem(x, y);
                Composite.add(engine.world, gem);
                GEMS.push(gem);
            }
        }
        spawnInitialGems();

        // レンダリング開始
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- コアロジック：BFS連鎖探索と破壊 ---

        // クリック・タッチイベントの共通処理
        function handlePointerDown(e) {
            e.preventDefault(); // スマホでのスクロールやダブルタップズームを防止

            // アニメーション中は新たなタップ操作を無効化（排他制御）
            if (isAnimating) return;

            const rect = render.canvas.getBoundingClientRect();
            // 物理エンジンの論理座標系（400x600）に合わせるためのスケール計算
            const scaleX = render.options.width / rect.width;
            const scaleY = render.options.height / rect.height;

            // タッチとマウスで座標の取得元を分ける
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const mousePosition = {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };

            const clickedBodies = Query.point(GEMS, mousePosition);

            if (clickedBodies.length > 0) {
                const clickedGem = clickedBodies[0];
                if (!clickedGem.isMarkedForDeletion) {
                    startChain(clickedGem);
                }
            }
        }

        // マウスとタッチ両方に対応（passive: false で preventDefault を有効化）
        render.canvas.addEventListener('mousedown', handlePointerDown, { passive: false });
        render.canvas.addEventListener('touchstart', handlePointerDown, { passive: false });

        // 宝石同士が指定距離内にあるか判定する関数（中心距離ベース）
        function areGemsTouching(g1, g2) {
            const dx = g1.position.x - g2.position.x;
            const dy = g1.position.y - g2.position.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            // オブジェクト生成時の半径＋許容距離で判定
            return dist < (g1.customRadius + g2.customRadius + CONNECTION_THRESHOLD);
        }

        // アクティブな宝石から隣接リストを生成
        function getAdjacencyList(activeGems) {
            const adjList = new Map();
            activeGems.forEach(g => adjList.set(g.id, []));

            for (let i = 0; i < activeGems.length; i++) {
                for (let j = i + 1; j < activeGems.length; j++) {
                    const g1 = activeGems[i];
                    const g2 = activeGems[j];
                    if (areGemsTouching(g1, g2)) {
                        adjList.get(g1.id).push(g2);
                        adjList.get(g2.id).push(g1);
                    }
                }
            }
            return adjList;
        }

        // 連鎖処理の開始
        function startChain(startGem) {
            isAnimating = true; // 排他制御ロック開始

            const activeGems = GEMS.filter(g => !g.isMarkedForDeletion);
            const adjList = getAdjacencyList(activeGems);

            const visited = new Set();
            visited.add(startGem.id);

            const targetColorId = startGem.colorId;
            const targetColorStr = startGem.colorStr;

            // 階層ごとの接続情報を保持する配列
            const levels = [];

            // 破壊対象をまとめるリスト
            const chainGems = [startGem];

            let currentLevelNodes = [startGem];

            // 幅優先探索 (BFS) で階層ごとにグループ化
            while (currentLevelNodes.length > 0) {
                const nextLevelNodes = [];
                const currentLevelConnections = [];

                for (const current of currentLevelNodes) {
                    const neighbors = adjList.get(current.id) || [];
                    for (const neighbor of neighbors) {
                        if (!visited.has(neighbor.id) && neighbor.colorId === targetColorId) {
                            visited.add(neighbor.id);
                            nextLevelNodes.push(neighbor);
                            chainGems.push(neighbor);
                            currentLevelConnections.push({
                                from: current,
                                to: neighbor
                            });
                        }
                    }
                }

                if (currentLevelConnections.length > 0) {
                    levels.push(currentLevelConnections);
                }
                currentLevelNodes = nextLevelNodes;
            }

            // 再クリック防止のため対象宝石のフラグを立てる
            chainGems.forEach(gem => gem.isMarkedForDeletion = true);

            // レーザーアニメーション開始
            animateLaserLevels(levels, chainGems, targetColorStr);
        }

        // レーザーの同心円状並列アニメーション
        function animateLaserLevels(levels, chainGems, glowColor) {
            // 単発（連鎖なし）の場合はアニメーション不要で破壊処理へ
            if (chainGems.length <= 1) {
                finalizeDestruction(chainGems);
                return;
            }

            let currentLevelIndex = 0;
            let currentChainCount = 1;

            function nextLevel() {
                if (currentLevelIndex >= levels.length) {
                    // 全階層のレーザーが完了。余韻を少し残して破壊
                    setTimeout(() => finalizeDestruction(chainGems), 150);
                    return;
                }

                const currentConnections = levels[currentLevelIndex];
                const now = performance.now();

                // 現在の階層の全レーザーを同時に発火
                currentConnections.forEach(conn => {
                    lightLines.push({
                        b1: conn.from,
                        b2: conn.to,
                        color: glowColor,
                        startTime: now,
                        duration: LASER_ANIMATION_MS
                    });
                });

                // ポップアップ更新
                currentChainCount += currentConnections.length;
                showChainPopup(currentChainCount, glowColor);

                currentLevelIndex++;
                // アニメーションが終わるタイミングで次の階層へ
                setTimeout(nextLevel, LASER_ANIMATION_MS);
            }

            // アニメーションスタート
            nextLevel();
        }

        function showChainPopup(count, color) {
            chainPopup.innerText = `${formatScore(count)} Chain`;
            chainPopup.style.color = color;

            // アニメーションのリセット（再トリガーのための工夫）
            chainPopup.classList.remove('active', 'fade-out');
            void chainPopup.offsetWidth; // リフローを強制
            chainPopup.classList.add('active');
        }

        // 破壊演出とスコア確定、補充処理
        function finalizeDestruction(chain) {
            const n = chain.length;

            // 破壊条件（3個以上でスコア加算）
            if (n >= 3) {
                const points = Math.floor(Math.pow(10, (n - 3) * 0.5) * 100);
                score += points;
                scoreElement.innerText = formatScore(score);

                // Chain表示をスコア表示に切り替え
                chainPopup.innerText = `+${formatScore(points)} Score!`;
                chainPopup.style.color = '#FFD700';
            } else {
                // 3個未満の場合はスコア加算なしで破壊。ポップアップは消す
                chainPopup.innerText = '';
            }

            // ポップアップをフェードアウト
            chainPopup.classList.remove('active');
            chainPopup.classList.add('fade-out');

            // 宝石の削除とパーティクル生成
            chain.forEach(gem => {
                // その宝石の色のパーティクルを生成
                spawnParticles(gem.position.x, gem.position.y, gem.colorStr);

                Composite.remove(engine.world, gem);
                const index = GEMS.indexOf(gem);
                if (index !== -1) {
                    GEMS.splice(index, 1);
                }
            });

            // レーザーをクリア
            lightLines = [];

            // 削除された個数と同数の新しい宝石を補充
            for (let i = 0; i < n; i++) {
                const x = 30 + Math.random() * 340;
                const y = -30 - i * 30; // 複数ある場合は縦にずらす

                const gem = createGem(x, y);
                Composite.add(engine.world, gem);
                GEMS.push(gem);
            }

            // 排他制御ロック解除（次のタップが可能になる）
            isAnimating = false;
        }

        // パーティクルの生成（物理エンジン外での軽量管理）
        function spawnParticles(x, y, colorStr) {
            const count = 5 + Math.floor(Math.random() * 5); // 1個につき5〜9個のパーティクル
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 4 + Math.random() * 4, // 4〜8pxの正方形
                    color: colorStr,
                    life: 1.0, // 不透明度（1.0 〜 0.0）
                    decay: 0.02 + Math.random() * 0.03 // フェード速度
                });
            }
        }

        // レンダリング後の追加描画（レーザーとパーティクル）
        Events.on(render, 'afterRender', () => {
            const ctx = render.context;

            // 1. レーザーの描画（這うアニメーション）
            if (lightLines.length > 0) {
                const now = performance.now();
                const glowColor = lightLines[0].color;

                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 15;

                lightLines.forEach(line => {
                    const elapsed = now - line.startTime;
                    let progress = Math.max(0, Math.min(elapsed / line.duration, 1.0));

                    // イージング（easeOutQuad）で少し滑らかに
                    progress = progress * (2 - progress);

                    const startX = line.b1.position.x;
                    const startY = line.b1.position.y;
                    const endX = line.b2.position.x;
                    const endY = line.b2.position.y;

                    const curX = startX + (endX - startX) * progress;
                    const curY = startY + (endY - startY) * progress;

                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(curX, curY);
                    ctx.stroke();
                });
                ctx.shadowBlur = 0; // 他の描画への影響をリセット
            }

            // 2. パーティクルの更新と描画（無重力で飛び散る）
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];

                // 位置の更新
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay; // 寿命を減らす

                if (p.life <= 0) {
                    particles.splice(i, 1); // 完全に消えたら配列から削除
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                // 中心を基準に正方形を描画
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                ctx.restore();
            }
        });
    </script>
</body>

</html>
