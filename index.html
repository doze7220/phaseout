<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase Out: Cluster String</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Title Scene -->
    <div id="scene-title" class="scene" style="cursor: pointer;">
        <div id="title-wrapper" style="position: relative; width: 100%; height: 100%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); border-radius: 10px; overflow: hidden; background-color: #2a2a2a; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <canvas id="title-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;"></canvas>
            <div style="position: relative; z-index: 1;">
                <h1 style="text-align: center; line-height: 1.3;">
                    <span style="font-size: 1.5em; display: block;">PHASE OUT</span>
                    <span style="font-size: 1em; display: block;">Cluster String</span>
                </h1>
                <div id="tap-start-text" class="blink" style="font-size: 24px; margin-top: 50px; text-align: center;">TAP START</div>
            </div>
            <div id="title-gem-style-toggle">
                <span>GEM :</span>
                <button id="btn-style-flat" class="style-toggle-btn active">FLAT</button>
                <button id="btn-style-rich" class="style-toggle-btn">RICH</button>
            </div>
            <div id="version-display"></div>
        </div>
    </div>

    <!-- Home Scene -->
    <div id="scene-home" class="scene">
        <h1>Home</h1>
        <button id="btn-to-puzzle" class="btn">Play Puzzle</button>
        <button id="btn-to-gacha" class="btn">Gacha</button>
    </div>

    <!-- Puzzle Scene -->
    <div id="scene-puzzle" class="scene">
        <div id="puzzle-header">
            <div id="level-display">Lv. 1</div>
            <div id="score-board"><span id="score">0</span></div>
        </div>
        <div id="puzzle-area">
            <svg id="life-gauge-svg">
                <!-- Base -->
                <path id="life-gauge-base-L" class="gauge-svg-path"></path>
                <path id="life-gauge-base-R" class="gauge-svg-path"></path>
                <!-- Damage -->
                <path id="life-gauge-damage-L" class="gauge-svg-path"></path>
                <path id="life-gauge-damage-R" class="gauge-svg-path"></path>
                <!-- Heal -->
                <path id="life-gauge-heal-L" class="gauge-svg-path"></path>
                <path id="life-gauge-heal-R" class="gauge-svg-path"></path>
                <!-- Main -->
                <path id="life-gauge-main-L" class="gauge-svg-path"></path>
                <path id="life-gauge-main-R" class="gauge-svg-path"></path>
            </svg>
            <div id="game-wrapper">
                <div id="pinch-overlay"></div>
            <div id="stasis-overlay"></div>
            <div id="level-up-popup" style="
                position: absolute; 
                top: 50%; 
                left: 50%; 
                transform: translate(-50%, -50%); 
                z-index: 18; 
                pointer-events: none; 
                text-align: center; 
                white-space: nowrap; 
                display: none;
                text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px #000;">
            </div>
            <div id="chain-popup"></div>
            <!-- リザルト画面（オーバーレイ） -->
            <div id="result-overlay" style="cursor: pointer;">
                <div id="final-score-title">Final Score</div>
                <div id="final-score">0</div>
                
                <div id="result-disrupt" style="text-align: center; margin-bottom: 30px;">
                    <div id="result-disrupt-title" style="font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #fff;">Disrupt</div>
                    <div id="result-stats" style="display: inline-block; text-align: left; font-size: 18px;">
                        <!-- JSで動的に追加 -->
                    </div>
                </div>

                <div id="tap-to-title" style="font-size: 16px; opacity: 0.7; animation: blink-animation 1.5s infinite steps(2, start); display: none;">Tap to Title</div>
            </div>
        </div>
        </div> <!-- Close puzzle-area -->
        <div id="puzzle-footer">
            <div id="footer-char-icon"></div>
            <div id="footer-skills">
                <div class="skill-btn">
                    <div class="skill-gauge"></div>
                    <span class="skill-label">Active Skill</span>
                </div>
                <div class="skill-btn" style="border-color: rgba(255, 215, 0, 0.5); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);">
                    <div class="skill-gauge" style="background: #FFD700; box-shadow: 0 0 10px #FFD700;"></div>
                    <span class="skill-label">Prism Link</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Gacha Scene -->
    <div id="scene-gacha" class="scene">
        <h1>Gacha</h1>
        <button id="btn-gacha-back" class="btn">戻る</button>
    </div>

    <!-- Matter.jsをCDNから読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script type="module" src="./main.js"></script>
</body>

</html>
