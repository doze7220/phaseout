<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Puzzle Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Title Scene -->
    <div id="scene-title" class="scene">
        <h1>Physics Puzzle Game</h1>
        <button id="btn-to-home" class="btn">Start Game</button>
    </div>

    <!-- Home Scene -->
    <div id="scene-home" class="scene">
        <h1>Home</h1>
        <button id="btn-to-puzzle" class="btn">Play Puzzle</button>
        <button id="btn-to-gacha" class="btn">Gacha</button>
    </div>

    <!-- Puzzle Scene -->
    <div id="scene-puzzle" class="scene">
        <button id="btn-end-game" class="btn">終了</button>
        <div id="game-wrapper">
            <div id="pinch-overlay"></div>
            <svg id="life-gauge-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path class="life-gauge-path" d="M 50,0 L 100,0 L 100,100 L 50,100" vector-effect="non-scaling-stroke" pathLength="100" />
                <path class="life-gauge-path" d="M 50,0 L 0,0 L 0,100 L 50,100" vector-effect="non-scaling-stroke" pathLength="100" />
            </svg>
            <div id="level-display">Lv. 1</div>
            <div id="score-board"><span id="score">0</span></div>
            <div id="chain-popup"></div>
            <!-- リザルト画面（オーバーレイ） -->
            <div id="result-overlay">
                <div id="final-score-title">Final Score</div>
                <div id="final-score">0</div>
                <button id="btn-result-home" class="btn">ホームへ戻る</button>
            </div>
        </div>
    </div>

    <!-- Gacha Scene -->
    <div id="scene-gacha" class="scene">
        <h1>Gacha</h1>
        <button id="btn-gacha-back" class="btn">戻る</button>
    </div>

    <!-- Matter.jsをCDNから読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script type="module" src="./main.js"></script>
</body>

</html>
